<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
  <title>Bird Blaster</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #1a1a2e;
      width: 100%;
      height: 100%;
      overflow: hidden;
      touch-action: manipulation;
      font-family: Arial, sans-serif;
    }
    #game-container {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      position: relative;
    }
    canvas {
      display: block;
      margin: 0 auto;
    }
    #name-modal {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.72);
      z-index: 50;
      padding: 24px;
      box-sizing: border-box;
    }
    #name-modal.show {
      display: flex;
    }
    .modal-card {
      width: min(92vw, 460px);
      background: linear-gradient(180deg, #6d4c41 0%, #4e342e 100%);
      border: 4px solid #ffd700;
      border-radius: 20px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.45);
      padding: 22px 20px 18px;
      color: white;
      text-align: center;
    }
    .modal-card h2 {
      margin: 0 0 8px;
      font-size: 34px;
    }
    .modal-card p {
      margin: 0 0 16px;
      font-size: 18px;
      opacity: 0.95;
    }
    #player-name-input {
      width: 100%;
      box-sizing: border-box;
      padding: 14px 16px;
      font-size: 22px;
      border-radius: 14px;
      border: 3px solid #ffd700;
      outline: none;
      margin-bottom: 14px;
      text-align: center;
    }
    .modal-actions {
      display: flex;
      gap: 12px;
      justify-content: center;
    }
    .modal-actions button {
      border: none;
      border-radius: 14px;
      padding: 14px 18px;
      min-width: 150px;
      font-size: 22px;
      font-weight: bold;
      cursor: pointer;
    }
    #start-game-btn {
      background: #ff6f00;
      color: white;
    }
    #cancel-name-btn {
      background: #d7ccc8;
      color: #3e2723;
    }
  </style>
</head>
<body>
  <div id="game-container"></div>

  <div id="name-modal" aria-hidden="true">
    <div class="modal-card">
      <h2>Ваше имя</h2>
      <p>Введите имя для рейтинговой таблицы</p>
      <input id="player-name-input" type="text" maxlength="16" placeholder="Например: Ivan" autocomplete="nickname" />
      <div class="modal-actions">
        <button id="cancel-name-btn" type="button">Назад</button>
        <button id="start-game-btn" type="button">Старт</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/phaser@3.70.0/dist/phaser.min.js"></script>
  <script src="game.js"></script>
</body>
</html>
